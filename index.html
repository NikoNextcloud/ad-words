<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рекламен асистент — проучване и обяви</title>
<style>
  :root{
    --bg:#0f0f13; --panel:#17171d; --panel2:#1e1e26; --line:#2a2a34;
    --text:#f2f0eb; --dim:#8b8b98;
    --cyan:#00b7d4; --magenta:#e91e8c; --yellow:#f5c518;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; padding-bottom:64px}
  .cmyk{display:flex; height:6px}
  .cmyk div{flex:1}
  .wrap{max-width:860px; margin:0 auto; padding:0 16px}
  header{padding:40px 0 8px}
  .eyebrow{font-size:12px; letter-spacing:3px; color:var(--dim); text-transform:uppercase}
  h1{font-size:clamp(28px,5vw,44px); margin-top:8px; font-weight:800; line-height:1.1}
  h1 span{background:linear-gradient(90deg,var(--cyan),var(--magenta),var(--yellow)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  header p{color:var(--dim); margin-top:10px; font-size:15px}
  .row{display:flex; gap:10px; margin-top:20px; flex-wrap:wrap}
  input{flex:1 1 260px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; color:var(--text); font-size:16px; outline:none; font-family:inherit}
  input:focus{border-color:var(--magenta)}
  button.primary{background:var(--magenta); color:#fff; border:none; border-radius:10px; padding:14px 26px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit}
  button.primary:disabled{background:var(--panel2); color:var(--dim); cursor:wait}
  .keyrow{margin-top:12px}
  .keyrow input{width:100%; font-size:13px; padding:10px 14px}
  .hint{font-size:12px; color:var(--dim); margin-top:6px; line-height:1.5}
  .hint a{color:var(--cyan)}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:22px; margin-top:20px}
  .card h2{font-size:13px; letter-spacing:2px; text-transform:uppercase}
  .loading{display:flex; align-items:center; gap:12px}
  .dots{display:flex; gap:5px}
  .dots i{width:10px; height:10px; border-radius:50%; animation:pulse 1.2s infinite ease-in-out}
  .dots i:nth-child(1){background:var(--cyan)}
  .dots i:nth-child(2){background:var(--magenta); animation-delay:.2s}
  .dots i:nth-child(3){background:var(--yellow); animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.25; transform:scale(.8)} 50%{opacity:1; transform:scale(1.15)}}
  .err{margin-top:20px; padding:16px; background:#2a1520; border:1px solid var(--magenta); border-radius:10px; color:#ff9ccb; font-size:14px; line-height:1.6}
  .kw{margin-top:12px}
  .kw .top{display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px}
  .bar{height:7px; background:var(--panel2); border-radius:4px; overflow:hidden}
  .bar i{display:block; height:100%; border-radius:4px; background:linear-gradient(90deg,var(--cyan),var(--magenta)); transition:width .6s ease}
  .note{font-size:12px; color:var(--dim); margin-top:4px}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px}
  .chip{background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:7px 14px; font-size:13px}
  ul.insights{margin-top:16px; padding-left:20px; color:var(--dim); font-size:14px; line-height:1.7}
  .adcard{border-top:3px solid var(--accent,var(--cyan))}
  .adhead{display:flex; justify-content:space-between; align-items:center}
  .copybtn{background:transparent; color:var(--dim); border:1px solid var(--line); border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; font-family:inherit}
  .copybtn.done{background:var(--accent); color:#fff; border-color:var(--accent)}
  .adtitle{margin-top:14px; font-weight:800; font-size:17px}
  .adtext{margin-top:10px; white-space:pre-wrap; line-height:1.7; font-size:15px}
  .tags{margin-top:8px; color:var(--cyan); font-size:14px; line-height:1.8}
  .empty{margin-top:40px; color:var(--dim); font-size:14px; text-align:center; padding:30px; border:1px dashed var(--line); border-radius:14px}
  .empty strong{color:var(--text)}
</style>
</head>
<body>
<div class="cmyk"><div style="background:var(--cyan)"></div><div style="background:var(--magenta)"></div><div style="background:var(--yellow)"></div><div style="background:#000"></div></div>

<div class="wrap">
  <header>
    <div class="eyebrow">Проучване · Ключови думи · Обяви</div>
    <h1>Рекламен <span>асистент</span></h1>
    <p>Въведи тема — асистентът проучва интернет, извлича най-търсените думи и съставя готови обяви за Facebook и Instagram.</p>
  </header>

  <div class="keyrow">
    <input id="apikey" type="password" placeholder="xAI (Grok) API ключ (xai-…)" autocomplete="off">
    <div class="hint">Ключът се пази само в твоя браузър и се изпраща към api.x.ai. Вземи безплатен ключ от <a href="https://console.x.ai" target="_blank" rel="noopener">console.x.ai</a>.</div>
  </div>

  <div class="row">
    <input id="query" placeholder="напр. „печат на винил“, „брандирани тениски“…">
    <button class="primary" id="go">Проучи</button>
  </div>

  <div id="out"></div>
</div>

<script>
'use strict';
var out = document.getElementById('out');
var apikeyInput = document.getElementById('apikey');
var queryInput = document.getElementById('query');
var goBtn = document.getElementById('go');

try { apikeyInput.value = localStorage.getItem('xai_key') || ''; } catch(e){}
apikeyInput.addEventListener('change', function(){
  try { localStorage.setItem('xai_key', apikeyInput.value.trim()); } catch(e){}
});

function esc(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadingHTML(msg){
  return '<div class="card loading"><div class="dots"><i></i><i></i><i></i></div>' +
         '<span style="color:var(--dim);font-size:14px">' + esc(msg) + '</span></div>';
}

function friendlyError(status, msg){
  if (status === 401) return 'Невалиден API ключ. Провери го в console.x.ai и го въведи отново в горното поле.';
  if (status === 403) return 'Ключът няма достъп (403). Провери дали има кредит в акаунта и дали ключът е активен.';
  if (status === 413) return 'Заявката е твърде голяма (413). Ползвай по-кратка тема (2-4 думи) и опитай пак.';
  if (status === 429) return 'Достигнат лимит на заявки (429). Изчакай минута и опитай отново.';
  if (status === 529 || status === 503) return 'xAI сървърите са претоварени в момента. Изчакай малко и опитай пак.';
  return 'Грешка от API (' + status + ')' + (msg ? ': ' + msg : '') + '.';
}

/* ── Извикване на Grok (xAI Responses API) ── */
function grokBody(prompt, useSearch){
  var body = {
    model: 'grok-4.3',
    max_output_tokens: 2500,
    input: [{ role: 'user', content: prompt }]
  };
  if (useSearch) body.tools = [{ type: 'web_search' }];
  return JSON.stringify(body);
}

function extractGrokText(data){
  var text = '';
  var outArr = data.output || [];
  for (var i = 0; i < outArr.length; i++){
    var item = outArr[i];
    if (item.type === 'message' && item.content){
      for (var j = 0; j < item.content.length; j++){
        if (item.content[j].type === 'output_text') text += item.content[j].text + '\n';
      }
    }
  }
  return text;
}

function doFetch(url, apiKey, bodyStr){
  return fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: bodyStr
  }).then(function(r){
    return r.json().catch(function(){ return {}; }).then(function(data){
      if (!r.ok || data.error){
        var m = '';
        if (data.error){ m = typeof data.error === 'string' ? data.error : (data.error.message || ''); }
        throw new Error(friendlyError(r.status, m));
      }
      return extractGrokText(data);
    });
  });
}

function callClaude(apiKey, prompt, useSearch){
  var bodyStr = grokBody(prompt, useSearch);
  var direct = 'https://api.x.ai/v1/responses';
  return doFetch(direct, apiKey, bodyStr).catch(function(e){
    if (e && e.message && e.message.indexOf('Грешка от API') === -1 &&
        e.message.indexOf('ключ') === -1 && e.message.indexOf('лимит') === -1 &&
        e.message.indexOf('претоварени') === -1 && e.message.indexOf('твърде голяма') === -1 &&
        e instanceof TypeError === false && e.name !== 'TypeError'){
      throw e;
    }
    if (e.name === 'TypeError' || (e.message && /fetch/i.test(e.message))){
      // Мрежова/CORS блокировка — опит през CORS proxy
      var proxied = 'https://corsproxy.io/?url=' + encodeURIComponent(direct);
      return doFetch(proxied, apiKey, bodyStr).catch(function(){
        throw new Error('Заявката не стигна до xAI (мрежова или CORS блокировка). Отвори сайта през https адрес (GitHub Pages), изключи adblock, и опитай пак.');
      });
    }
    throw e;
  });
}

/* ── Промпт: редов формат вместо JSON — не може да се счупи ── */
function buildPrompt(q){
  return 'Ти си експерт по дигитален маркетинг за българския пазар. Направи кратко интернет проучване (web search, максимум 3 търсения) за темата: "' + q + '" в България — кои ключови думи се търсят най-често и какви обяви работят.\n\n' +
  'След това отговори САМО в следния редов формат, ред по ред, без нищо друго преди или след:\n\n' +
  'KW|дума или фраза|число 0-100|кратка бележка\n' +
  '(6 до 8 реда KW, сортирани по популярност)\n' +
  'PH|популярна търсена фраза\n' +
  '(4 до 5 реда PH)\n' +
  'IN|кратък извод от проучването\n' +
  '(3 реда IN)\n' +
  'FBH|заглавие за Facebook обява\n' +
  'FBT|пълен текст за Facebook: 3-5 изречения с емоджита и призив за действие, вплитащ най-търсените думи (всичко на ЕДИН ред, без нови редове)\n' +
  'IGH|заглавие за Instagram\n' +
  'IGT|текст за Instagram: по-кратък, визуален стил, с емоджита (на един ред)\n' +
  'IGX|8-12 хаштага разделени с интервал, микс български и английски\n' +
  'SH|кратка спонсорирана обява от 1-2 изречения\n\n' +
  'Правила: всеки ред започва с код и |, съдържанието е на един ред. Български език, естествен продаващ стил.';
}

/* ── Парсване на редовия формат ── */
function parseLines(text){
  var r = { keywords: [], phrases: [], insights: [], fb: {}, ig: {}, sh: {} };
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++){
    var line = lines[i].trim();
    var p = line.indexOf('|');
    if (p < 2 || p > 4) continue;
    var code = line.slice(0, p).toUpperCase();
    var rest = line.slice(p + 1).trim();
    if (!rest) continue;
    if (code === 'KW'){
      var parts = rest.split('|');
      r.keywords.push({
        word: (parts[0] || '').trim(),
        popularity: Math.max(0, Math.min(100, parseInt(parts[1], 10) || 50)),
        note: (parts[2] || '').trim()
      });
    }
    else if (code === 'PH') r.phrases.push(rest);
    else if (code === 'IN') r.insights.push(rest);
    else if (code === 'FBH') r.fb.headline = rest;
    else if (code === 'FBT') r.fb.text = (r.fb.text ? r.fb.text + ' ' : '') + rest;
    else if (code === 'IGH') r.ig.headline = rest;
    else if (code === 'IGT') r.ig.text = (r.ig.text ? r.ig.text + ' ' : '') + rest;
    else if (code === 'IGX') r.ig.hashtags = rest;
    else if (code === 'SH') r.sh.text = (r.sh.text ? r.sh.text + ' ' : '') + rest;
  }
  return r;
}

function run(){
  var q = queryInput.value.trim();
  var key = apikeyInput.value.trim();
  if (!q) return;
  if (q.length > 120) q = q.slice(0, 120);
  if (!key){
    out.innerHTML = '<div class="err">Въведи Anthropic API ключ в горното поле, за да работи проучването.</div>';
    return;
  }
  try { localStorage.setItem('xai_key', key); } catch(e){}

  goBtn.disabled = true;
  goBtn.textContent = 'Проучвам…';
  out.innerHTML = loadingHTML('Проучвам интернет за „' + q + '“… (30-60 сек)');

  callClaude(key, buildPrompt(q), true)
    .then(function(text){
      var r = parseLines(text);
      if (!r.keywords.length && !r.fb.text){
        throw new Error('Отговорът дойде в неочакван формат. Натисни „Проучи“ още веднъж — обикновено вторият опит минава.');
      }
      render(r, q);
    })
    .catch(function(e){
      out.innerHTML = '<div class="err">' + esc(e.message) + '</div>';
    })
    .then(function(){
      goBtn.disabled = false;
      goBtn.textContent = 'Проучи';
    });
}

function render(r, q){
  var html = '';
  var kwMax = 1;
  for (var i = 0; i < r.keywords.length; i++) kwMax = Math.max(kwMax, r.keywords[i].popularity);

  if (r.keywords.length){
    html += '<section class="card"><h2 style="color:var(--cyan)">Най-търсени ключови думи</h2>';
    for (var i = 0; i < r.keywords.length; i++){
      var k = r.keywords[i];
      html += '<div class="kw"><div class="top"><strong>' + esc(k.word) + '</strong>' +
              '<span style="color:var(--dim)">' + k.popularity + '</span></div>' +
              '<div class="bar"><i style="width:' + (k.popularity / kwMax * 100) + '%"></i></div>' +
              (k.note ? '<div class="note">' + esc(k.note) + '</div>' : '') + '</div>';
    }
    html += '</section>';
  }

  if (r.phrases.length || r.insights.length){
    html += '<section class="card"><h2 style="color:var(--yellow)">Популярни търсения</h2><div class="chips">';
    for (var i = 0; i < r.phrases.length; i++) html += '<span class="chip">🔍 ' + esc(r.phrases[i]) + '</span>';
    html += '</div>';
    if (r.insights.length){
      html += '<ul class="insights">';
      for (var i = 0; i < r.insights.length; i++) html += '<li>' + esc(r.insights[i]) + '</li>';
      html += '</ul>';
    }
    html += '</section>';
  }

  var ads = [
    { label:'Facebook обява', accent:'#1877f2', head:r.fb.headline, text:r.fb.text, tags:'' },
    { label:'Instagram пост', accent:'#e91e8c', head:r.ig.headline, text:r.ig.text, tags:r.ig.hashtags || '' },
    { label:'Кратка спонсорирана обява', accent:'#f5c518', head:'', text:r.sh.text, tags:'' }
  ];
  var copies = [];
  for (var i = 0; i < ads.length; i++){
    var a = ads[i];
    if (!a.text) continue;
    var full = (a.head ? a.head + '\n\n' : '') + a.text + (a.tags ? '\n\n' + a.tags : '');
    copies.push(full);
    html += '<section class="card adcard" style="--accent:' + a.accent + '">' +
      '<div class="adhead"><h2 style="color:' + a.accent + '">' + a.label + '</h2>' +
      '<button class="copybtn" data-i="' + (copies.length - 1) + '">Копирай</button></div>' +
      (a.head ? '<div class="adtitle">' + esc(a.head) + '</div>' : '') +
      '<p class="adtext">' + esc(a.text) + '</p>' +
      (a.tags ? '<div class="tags">' + esc(a.tags) + '</div>' : '') +
      '</section>';
  }

  out.innerHTML = html;
  var btns = out.querySelectorAll('.copybtn');
  for (var i = 0; i < btns.length; i++){
    (function(btn){
      btn.addEventListener('click', function(){
        var t = copies[parseInt(btn.getAttribute('data-i'), 10)] || '';
        function done(){
          btn.classList.add('done'); btn.textContent = '✓ Копирано';
          setTimeout(function(){ btn.classList.remove('done'); btn.textContent = 'Копирай'; }, 1500);
        }
        if (navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(t).then(done, function(){ fallbackCopy(t); done(); });
        } else { fallbackCopy(t); done(); }
      });
    })(btns[i]);
  }
}

function fallbackCopy(t){
  var ta = document.createElement('textarea');
  ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
}

goBtn.addEventListener('click', run);
queryInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') run(); });

out.innerHTML = '<div class="empty">Пример: напиши <strong>„печат на винил“</strong> и натисни „Проучи“ —<br>ще получиш ключови думи, популярни търсения и три готови обяви.</div>';
</script>
</body>
</html>
